<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>PokerLab</title>
</head>

<body>
    <div class="app">
        <div class="calculator-container">
            <!-- Onglets -->
            <div>
                <button id="btn-cote" class="tab-btn active">Cote Pot</button>
                <button id="btn-ko" class="tab-btn">Calculateur KO</button>
            </div>

            <!-- Vue : Cote du Pot -->
            <div id="view-odds" class="view-container">
                <input type="number" id="input-pot" placeholder="Taille du Pot">
                <input type="number" id="input-call" placeholder="Montant à Payer">
                <span id="resultat-cote">0%</span>
            </div>

            <!-- Vue : Calculateur KO -->
            <div id="view-ko" class="view-container hidden">
                <input type="number" id="input-buyin" placeholder="Buy-in Total ($)">
                <input type="number" id="input-stack" placeholder="Stack de départ">
                <input type="number" id="input-bounty" placeholder="Prime KO ($)">
                <span id="resultat-ko">0</span>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>

</html>
